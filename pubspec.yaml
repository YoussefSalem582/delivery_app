name: delivery_app
description: Nokta — scalable ride-hailing MVP with offline-first cache, tracking, and notifications.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.7.0
  easy_localization: ^3.0.7
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  talker_flutter: ^4.0.2
  talker_dio_logger: ^4.0.2
  talker_bloc_logger: ^4.0.2
  lottie: ^3.1.2
  go_router: ^14.8.1
  dartz: ^0.10.1
  get_it: ^8.0.0
  connectivity_plus: ^6.1.1
  workmanager: ^0.9.0+3
  equatable: ^2.0.7
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_map_animations: ^0.9.0
  flutter_map_cache: ^2.0.0
  http_cache_file_store: ^2.0.0
  url_launcher: ^6.3.1
  skeletonizer: ^2.0.1
  flutter_animate: ^4.5.2
  toastification: ^3.0.2
  formz: ^0.8.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/translations/
    - assets/lottie/
    - assets/logo.svg
    - assets/logo.png
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/app_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F7F9FC"
  image: assets/logo.png
  android_12:
    color: "#F7F9FC"
    image: assets/logo.png
  ios: true
  android: true
