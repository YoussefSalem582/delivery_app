<!DOCTYPE html>

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc; /* Matching surface background */
        }
        
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0, 102, 255, 0.1); /* Background ring using primary-container with opacity */
            border-top-color: #0066ff; /* Primary blue for the active part */
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="min-h-screen bg-surface flex flex-col items-center justify-center p-margin-mobile overflow-hidden antialiased">
<!-- Main Content Container with Fade-In Animation -->
<main class="flex flex-col items-center justify-center w-full max-w-sm mx-auto opacity-0 animate-fade-in-up">
<!-- Logo Icon -->
<div class="mb-4 text-primary">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'FILL' 1;">
                directions_car
            </span>
</div>
<!-- App Name -->
<h1 class="font-display-lg text-display-lg text-on-surface mb-12 tracking-tight">
            Nokta
        </h1>
<!-- Loading Indicator -->
<div class="mb-6">
<div class="loader-ring animate-spin-slow"></div>
</div>
<!-- Subtitle -->
<p class="font-body-lg text-body-lg text-on-surface-variant text-center">
            Loading your ride experience...
        </p>
</main>
<script>
        // Optional: Simple script to transition away after a delay (simulating load)
        // In a real app, this would be handled by the routing/state management.
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                // e.g., window.location.href = '/home';
                console.log('Splash screen finished. Ready to navigate.');
            }, 3000);
        });
    </script>
</body></html>
