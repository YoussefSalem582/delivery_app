<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nokta - Map View</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#f7f9fc",
                    "surface": "#f7f9fc",
                    "tertiary-container": "#956a00",
                    "surface-container-highest": "#e0e3e6",
                    "on-surface": "#191c1e",
                    "outline": "#727687",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#fff6ee",
                    "outline-variant": "#c2c6d8",
                    "on-primary-fixed": "#001849",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#f8f7ff",
                    "surface-container-high": "#e6e8eb",
                    "on-secondary-container": "#007262",
                    "inverse-surface": "#2d3133",
                    "tertiary": "#765300",
                    "surface-container-low": "#f2f4f7",
                    "secondary-fixed-dim": "#41ddc2",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "background": "#f7f9fc",
                    "on-background": "#191c1e",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#00201b",
                    "on-secondary-fixed-variant": "#005045",
                    "secondary-fixed": "#65fade",
                    "surface-variant": "#e0e3e6",
                    "tertiary-fixed": "#ffdea8",
                    "on-tertiary-fixed-variant": "#5e4200",
                    "inverse-on-surface": "#eff1f4",
                    "on-surface-variant": "#424656",
                    "primary-fixed-dim": "#b3c5ff",
                    "on-primary-fixed-variant": "#003fa4",
                    "surface-dim": "#d8dadd",
                    "secondary-container": "#65fade",
                    "primary": "#0050cb",
                    "on-tertiary-fixed": "#271900",
                    "secondary": "#006b5c",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#0066ff",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffba20",
                    "surface-tint": "#0054d6",
                    "surface-container": "#eceef1",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#b3c5ff",
                    "primary-fixed": "#dae1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "sm": "8px",
                    "lg": "24px",
                    "gutter": "16px",
                    "md": "16px",
                    "unit": "4px",
                    "xs": "4px",
                    "margin-desktop": "32px",
                    "margin-mobile": "16px",
                    "safe": "env(safe-area-inset-bottom)"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "title-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-lg": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[style*="'FILL' 1"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Map background overlay to simulate map texture */
        .map-bg {
            background-color: #e5e3df; /* Classic light map base color */
            background-image: 
                linear-gradient(45deg, #ffffff 25%, transparent 25%, transparent 75%, #ffffff 75%, #ffffff),
                linear-gradient(45deg, #ffffff 25%, transparent 25%, transparent 75%, #ffffff 75%, #ffffff);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.8;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative">
<!-- Map Layer (Level 0) -->
<div class="absolute inset-0 z-0 map-bg" data-location="Modern urban city center map view, bright daylight, light mode UI aesthetic, clean geometric streets" style=""></div>
<!-- User Location Marker -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 flex items-center justify-center">
<div class="w-12 h-12 bg-primary/20 rounded-full animate-ping absolute"></div>
<div class="w-6 h-6 bg-surface rounded-full flex items-center justify-center shadow-md relative z-10">
<div class="w-4 h-4 bg-primary rounded-full"></div>
</div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center h-14 px-margin-mobile bg-surface text-primary">
<button aria-label="Menu" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-title-lg font-title-lg font-bold text-primary">Nokta</h1>
<div aria-label="User profile photo" class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant hover:bg-surface-container transition-colors cursor-pointer bg-surface-container-high">
<!-- Avatar Placeholder -->
<div class="w-full h-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</div>
</div>
</header>
<!-- Offline Banner -->
<div class="fixed top-14 w-full z-40 bg-tertiary-fixed-dim text-on-tertiary-fixed-variant px-margin-mobile py-2 flex items-center justify-center gap-2 shadow-sm font-label-md text-label-md">
<span class="material-symbols-outlined text-[18px]" data-icon="cloud_off">cloud_off</span>
<span>You are offline</span>
</div>
<!-- Floating Action Area -->
<div class="fixed bottom-[80px] left-0 w-full px-margin-mobile z-40">
<!-- Request Ride Button (Level 2 Elevation) -->
<button class="w-full h-[52px] bg-primary text-on-primary rounded-lg flex items-center justify-center gap-2 font-label-lg text-label-lg shadow-[0px_4px_12px_rgba(0,0,0,0.08)] active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined" data-icon="directions_car" data-weight="fill" style="font-variation-settings: 'FILL' 1;">directions_car</span>
            Request Ride
        </button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 h-[56px] flex justify-around items-center bg-surface-container-lowest px-4 pb-safe shadow-[0px_-4px_12px_rgba(0,0,0,0.08)]">
<!-- Active Tab: Home -->
<button class="flex flex-col items-center justify-center text-primary relative after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1 h-full px-2">
<span class="material-symbols-outlined" data-icon="home" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-md text-label-md mt-1">Home</span>
</button>
<!-- Inactive Tab: Trips -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-lg h-full px-4">
<span class="material-symbols-outlined" data-icon="directions_car">directions_car</span>
<span class="font-label-md text-label-md mt-1">Trips</span>
</button>
<!-- Inactive Tab: Alerts -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-lg h-full px-4">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-label-md text-label-md mt-1">Alerts</span>
</button>
<!-- Inactive Tab: Profile -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-lg h-full px-4">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md mt-1">Profile</span>
</button>
</nav>
</body></html>
