<style>.map-bg {
    background-color: #e5e5e5;
    /* Fallback */
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDUTkDEzkuOAeX5qV1tL1hRJxXEoIbD5PAVanMLWJWoQAfF4aoY7rI2wOoyBVNwXyu-5Td7BV7SGxAFLyj_YrpjbWTvFQWwxSzplVBXpRp-hEhNXqzFjKnG0x8-D-ztLa-3WYPmlD6q8rjCBHdyRNML8YJovvV08S5S_cKJGWgJTvpMQmd5IB_QhuXx3UY3Hhy6uccNI4_iQem2LNf3_WEOu_I4I98yy6XA8saRjOWZmd96Fzh80b4V3UfCqu_QvHCpCPrA88ddxbxV);
    background-size: cover;
    background-position: center
    }
/* Map route polyline mockup */
.route-line {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(15deg);
    width: 250px;
    height: 6px;
    background-color: #0050cb;
    /* primary */
    border-radius: 3px;
    box-shadow: 0 0 4px rgba(0, 80, 203, 0.5)
    }
/* Moving car animation */
@keyframes drive {
    0% {
        transform: translateX(-120px) translateY(-10px) rotate(15deg);
        } 100% {
        transform: translateX(100px) translateY(50px) rotate(15deg);
        }
    }
.moving-car {
    animation: drive 10s linear infinite
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-full overflow-hidden relative flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary">
<!-- Map Background Level 0 -->
<div class="absolute inset-0 map-bg z-0" data-alt="A clean, modern top-down street map visualization of a bustling city center. The map is designed in a minimalist, light-mode style with soft gray roads, subtle green park areas, and light beige building blocks. The visual aesthetic is reminiscent of premium ride-hailing apps, prioritizing clarity and high contrast for navigation routes." data-location="Cairo, Egypt" style="">
<!-- Route Polyline -->
<div class="route-line z-10"></div>
<!-- Pickup Pin (Green) -->
<div class="absolute top-1/2 left-1/2 -translate-x-[120px] -translate-y-[20px] z-20 flex flex-col items-center">
<div class="bg-secondary text-on-secondary p-1 rounded-full shadow-md">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">trip_origin</span>
</div>
<div class="w-1 h-3 bg-secondary"></div>
</div>
<!-- Drop-off Pin (Red) -->
<div class="absolute top-1/2 left-1/2 translate-x-[110px] translate-y-[45px] z-20 flex flex-col items-center">
<div class="bg-error text-on-error p-1 rounded-full shadow-md">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="w-1 h-3 bg-error"></div>
</div>
<!-- Moving Car Marker -->
<div class="absolute top-1/2 left-1/2 moving-car z-30">
<div class="bg-surface-container-lowest p-2 rounded-full shadow-level2 border border-surface-variant flex items-center justify-center relative">
<!-- Inner blue dot indicating direction -->
<div class="absolute -top-1 right-0 w-3 h-3 bg-primary rounded-full border-2 border-surface-container-lowest"></div>
<span class="material-symbols-outlined text-primary text-[24px]" style="font-variation-settings: 'FILL' 1;">local_taxi</span>
</div>
</div>
</div>
<!-- Top App Bar (From Shared Components JSON) - Suppressed standard TopAppBar for specific requirements -->
<header class="flex justify-between items-center w-full px-margin-mobile h-14 bg-surface dark:bg-background docked full-width top-0 z-50">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-on-surface-variant bg-surface-container-lowest shadow-sm">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-title-lg font-title-lg font-bold text-primary dark:text-inverse-primary truncate flex-1 text-center px-4 drop-shadow-md bg-surface-container-lowest/80 backdrop-blur-sm rounded-full py-1 mx-2">
            Live Tracking
        </h1>
<div class="w-10 h-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Canvas Area (Empty, filled by map) -->
<main class="flex-1 relative z-10 pointer-events-none">
<!-- Floating Actions -->
<div class="absolute right-4 bottom-32 pointer-events-auto flex flex-col gap-3">
<button aria-label="Recenter Map" class="w-14 h-14 bg-surface-container-lowest rounded-full shadow-level2 flex items-center justify-center text-primary hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[28px]">my_location</span>
</button>
</div>
</main>
<!-- Bottom ETA Card Overlay -->
<div class="absolute bottom-4 left-4 right-4 z-40">
<div class="bg-surface-container-lowest rounded-card shadow-level2 border border-surface-variant p-4 pointer-events-auto">
<div class="flex justify-between items-start mb-4">
<div class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface-variant uppercase tracking-wide">ETA</span>
<span class="text-display-lg font-display-lg text-primary leading-none mt-1">8 min</span>
</div>
<!-- Status Chip -->
<div class="bg-primary-container text-on-primary-container px-3 py-1.5 rounded-full flex items-center gap-1.5 h-[32px]">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-label-md font-label-md whitespace-nowrap">In Progress</span>
</div>
</div>
<div class="h-[1px] w-full bg-outline-variant/30 my-3"></div>
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-surface-variant overflow-hidden shrink-0 border border-outline-variant/20 relative">
<!-- Using generic gradient placeholder as requested to avoid data URIs -->
<div class="w-full h-full bg-gradient-to-br from-surface-dim to-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-outline">person</span>
</div>
</div>
<div class="flex flex-col flex-1">
<span class="text-label-lg font-label-lg text-on-surface">Driver: Ahmed Hassan</span>
<div class="flex items-center gap-1 mt-0.5">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-body-md font-body-md text-on-surface-variant">4.9</span>
<span class="text-on-surface-variant mx-1">•</span>
<span class="text-body-md font-body-md text-on-surface-variant">Silver Toyota Corolla</span>
</div>
</div>
<button class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary shrink-0 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
</div>
</div>
<!-- Navigation Suppressed intentionally: Linear/Transactional intent (Live Tracking implies focused journey, back action present) -->
</body></html>
