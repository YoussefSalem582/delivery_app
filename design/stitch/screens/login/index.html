<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Nokta - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#f2f4f7",
                    "secondary-fixed": "#65fade",
                    "on-tertiary-fixed-variant": "#5e4200",
                    "on-primary-fixed-variant": "#003fa4",
                    "surface-container": "#eceef1",
                    "on-primary-container": "#f8f7ff",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#ffdea8",
                    "primary-fixed-dim": "#b3c5ff",
                    "surface-container-high": "#e6e8eb",
                    "on-secondary-fixed": "#00201b",
                    "surface-tint": "#0054d6",
                    "surface-dim": "#d8dadd",
                    "primary-container": "#0066ff",
                    "primary": "#0050cb",
                    "surface-variant": "#e0e3e6",
                    "inverse-primary": "#b3c5ff",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e0e3e6",
                    "outline": "#727687",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#eff1f4",
                    "inverse-surface": "#2d3133",
                    "outline-variant": "#c2c6d8",
                    "background": "#f7f9fc",
                    "secondary-fixed-dim": "#41ddc2",
                    "on-surface": "#191c1e",
                    "on-secondary-container": "#007262",
                    "on-primary-fixed": "#001849",
                    "surface": "#f7f9fc",
                    "tertiary": "#765300",
                    "secondary": "#006b5c",
                    "on-secondary-fixed-variant": "#005045",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#956a00",
                    "on-tertiary-fixed": "#271900",
                    "on-surface-variant": "#424656",
                    "tertiary-fixed-dim": "#ffba20",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#fff6ee",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#65fade",
                    "on-background": "#191c1e",
                    "surface-bright": "#f7f9fc",
                    "primary-fixed": "#dae1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "xs": "4px",
                    "xl": "32px",
                    "md": "16px",
                    "gutter": "16px",
                    "unit": "4px",
                    "sm": "8px",
                    "margin-desktop": "32px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "title-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Loading Spinner Animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 1.5s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center font-body-md p-margin-mobile antialiased">
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col bg-surface-container-lowest rounded-[24px] p-lg shadow-[0px_8px_24px_rgba(0,0,0,0.04)] relative overflow-hidden z-10 border border-outline-variant/30">
<!-- Header Section -->
<div class="flex flex-col items-center text-center mb-xl">
<!-- Brand Logo -->
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-sm shadow-sm">
<span class="material-symbols-outlined filled text-[32px]">directions_car</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs tracking-tight">Nokta</h1>
<div class="mt-lg">
<h2 class="font-title-lg text-title-lg text-on-surface mb-xs">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to continue your journey</p>
</div>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-md w-full" onsubmit="event.preventDefault(); document.getElementById('loadingSpinner').classList.remove('hidden'); document.getElementById('btnText').classList.add('hidden'); setTimeout(() =&gt; { document.getElementById('loadingSpinner').classList.add('hidden'); document.getElementById('btnText').classList.remove('hidden'); }, 2000);">
<!-- Email Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline ml-sm">mail</span>
</div>
<input class="w-full h-[52px] bg-[#F5F7FA] border-none rounded-xl pl-[48px] pr-sm font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/70 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors duration-200 outline-none" id="email" placeholder="demo@delivery.app" required="" type="email" value="demo@delivery.app"/>
</div>
<!-- Password Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline ml-sm">lock</span>
</div>
<input class="w-full h-[52px] bg-[#F5F7FA] border-none rounded-xl pl-[48px] pr-[48px] font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/70 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors duration-200 outline-none" id="password" placeholder="••••••••" required="" type="password" value="demo123"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface focus:outline-none transition-colors" onclick="const p = document.getElementById('password'); const i = this.querySelector('span'); if(p.type === 'password'){p.type='text'; i.textContent='visibility_off';}else{p.type='password'; i.textContent='visibility';}" type="button">
<span class="material-symbols-outlined mr-sm">visibility</span>
</button>
</div>
<!-- Helper Text -->
<p class="font-label-md text-label-md text-outline px-xs text-center mt-xs">Use any email and password for demo</p>
<!-- Submit Button -->
<button class="w-full h-[52px] bg-primary text-on-primary font-label-lg text-label-lg rounded-xl mt-sm flex items-center justify-center hover:bg-surface-tint focus:ring-4 focus:ring-primary-fixed-dim focus:outline-none active:scale-[0.98] transition-all duration-200 relative overflow-hidden group" type="submit">
<span class="absolute inset-0 w-full h-full bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></span>
<span id="btnText">Sign In</span>
<span class="material-symbols-outlined animate-spin-slow hidden" id="loadingSpinner">progress_activity</span>
</button>
</form>
</main>
<!-- Background Pattern Decoration (Subtle) -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-[0.03] bg-[radial-gradient(#0050cb_1px,transparent_1px)] [background-size:16px_16px]"></div>
</body></html>
