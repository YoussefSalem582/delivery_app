<style>
        /* Scrim and sheet animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.4; } }

        .sheet-enter { animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

<!-- Floating Action Button (Locate Me) - Suppressed as per instructions to keep minimal chrome and focus on the bottom sheet inputs -->
<!-- Bottom Sheet Modal -->
<div class="absolute bottom-0 w-full bg-surface-container-lowest rounded-t-[24px] shadow-[0px_-4px_12px_rgba(0,0,0,0.08)] z-50 sheet-enter flex flex-col pb-safe">
<!-- Handle -->
<div class="w-full flex justify-center pt-sm pb-sm cursor-grab">
<div class="w-8 h-1 bg-surface-variant rounded-full"></div>
</div>
<div class="px-margin-mobile pb-lg flex flex-col gap-lg">
<!-- Headline -->
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Where to?</h1>
<!-- Input Fields -->
<div class="flex flex-col relative">
<!-- Connecting Line between icons -->
<div class="absolute left-[23px] top-[40px] bottom-[40px] w-0.5 bg-outline-variant z-0"></div>
<!-- Pickup Input -->
<div class="flex items-center gap-md relative z-10 mb-sm">
<div class="w-[48px] flex justify-center items-center">
<span class="material-symbols-outlined text-primary" data-icon="trip_origin" style="font-variation-settings: 'FILL' 1;">trip_origin</span>
</div>
<div class="flex-1 h-[52px] bg-surface-container-low rounded-lg border border-transparent focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors flex items-center px-4">
<input aria-label="Pickup location" class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-lg font-body-lg text-on-surface" placeholder="Enter pickup location" type="text" value="Current Location"/>
</div>
</div>
<!-- Drop-off Input -->
<div class="flex items-center gap-md relative z-10">
<div class="w-[48px] flex justify-center items-center">
<span class="material-symbols-outlined text-error" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="flex-1 h-[52px] bg-surface-container-low rounded-lg border border-transparent focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors flex items-center px-4">
<input aria-label="Drop-off destination" class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-lg font-body-lg text-on-surface" placeholder="Enter drop-off destination" type="text" value="City Mall"/>
</div>
</div>
</div>

<button class="w-full h-[52px] bg-primary-container text-on-primary flex justify-center items-center gap-2 rounded-[12px] text-label-lg font-label-lg hover:bg-surface-tint active:scale-[0.98] transition-all shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container mt-xs">

<span class="material-symbols-outlined animate-spin-slow text-[20px]" data-icon="progress_activity">progress_activity</span>
</button>
